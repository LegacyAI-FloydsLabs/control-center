name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # --ignore-scripts skips node-pty's native postinstall.
      # node-pty is only needed at runtime on the dev server; CI just
      # typechecks and bundles the frontend. The bundled .d.ts files
      # from node-pty are still installed, so tsc remains happy.
      - name: install
        run: npm ci --ignore-scripts

      - name: typecheck
        run: npm run lint

      - name: build
        run: npm run build
